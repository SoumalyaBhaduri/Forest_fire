<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        input, select {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <center><h1>Forest Fire Prediction test</h1></center>
    <form action="{{ url_for('predict') }}"  method="POST">
        <label>Temperature (°C)</label>
        <input type="number" name="temperature" placeholder="Temperature" step="0.1" required>
        
        <label>Relative Humidity (%)</label>
        <input type="number" name="humidity" placeholder="Humidity" min="0" max="100" required>
        
        <label>Wind Speed (km/h)</label>
        <input type="number" name="wind_speed" placeholder="Wind Speed" step="0.1" required>
        
        <label>Rainfall (mm)</label>
        <input type="number" name="rainfall" placeholder="Rainfall" step="0.1" required>
        
        <label>Fine Fuel Moisture Code (FFMC)</label>
        <input type="number" name="ffmc" placeholder="FFMC" step="0.1" required>
        
        <label>Duff Moisture Code (DMC)</label>
        <input type="number" name="dmc" placeholder="DMC" step="0.1" required>
        
        <label>Initial Spread Index (ISI)</label>
        <input type="number" name="isi" placeholder="ISI" step="0.1" required>

        <label>Classes</label>
        <input type="number" name="classes" placeholder="classes"  required>
        

        <button type="submit">Predict</button>
    </form>
    <center><h2>
        The FWI prediction is {{results}}
    </center></h2>
</body>
</html>
